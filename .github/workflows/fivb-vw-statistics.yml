# Volleyball World BPT statistics only (HTML from sitemap → raw.raw_vw_player_tournament_stats).
# Isolated from the VIS/dbt/Elo pipeline so scraper or HTML changes do not fail the main job.
# Vercel daily cron: /api/trigger-fivb-pipelines (also /api/trigger-fivb-vw-statistics for VW-only).

name: FIVB VW statistics (Supabase)

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Postgres URL (Vercel trigger passes DATABASE_URL; or leave empty if repo secret is set)"
        required: false
        type: string

concurrency:
  group: fivb-vw-statistics
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${{ github.event.inputs.database_url || secrets.DATABASE_URL }}
      ETL_VW_STATS_WORKERS: "8"
    defaults:
      run:
        working-directory: fivb-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask DATABASE_URL in logs
        run: echo "::add-mask::${DATABASE_URL}"

      - name: Require DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::No DATABASE_URL. Use the Vercel trigger, or set repository secret DATABASE_URL."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fivb-pipeline/requirements-cron.txt

      - name: Install dependencies
        run: pip install -r requirements-cron.txt

      - name: Run VW statistics ingest
        run: python scripts/run_vw_statistics.py
