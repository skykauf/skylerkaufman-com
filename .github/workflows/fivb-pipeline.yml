# Full FIVB pipeline: VIS ETL -> dbt models -> Elo tables -> Supabase Postgres.
# Intended to run on GitHub-hosted runners (long timeout). Vercel cron calls
# api/trigger-fivb-pipeline, which dispatches this workflow with database_url
# from Vercel env (no DATABASE_URL secret required on GitHub for that path).
#
# Optional: set repository secret DATABASE_URL and run from Actions UI without
# pasting the URL, or re-add a schedule block that uses the secret only.

name: FIVB pipeline (Supabase)

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Postgres URL (Vercel trigger passes DATABASE_URL; or leave empty if repo secret is set)"
        required: false
        type: string

concurrency:
  group: fivb-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATABASE_URL: ${{ github.event.inputs.database_url || secrets.DATABASE_URL }}
    defaults:
      run:
        working-directory: fivb-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask DATABASE_URL in logs
        run: echo "::add-mask::${DATABASE_URL}"

      - name: Require DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::No DATABASE_URL. Use the Vercel trigger (passes workflow input), or set repository secret DATABASE_URL and run workflow_dispatch with an empty input."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fivb-pipeline/requirements-cron.txt

      - name: Install dependencies
        run: pip install -r requirements-cron.txt

      - name: Run pipeline
        run: python run_full_pipeline.py
