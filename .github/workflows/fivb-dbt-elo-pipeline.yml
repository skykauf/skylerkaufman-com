# FIVB transforms pipeline: Elo init -> dbt -> Elo compute (Supabase Postgres).
# Can run standalone (workflow_dispatch) or be called from VIS raw pipeline.

name: FIVB dbt and Elo pipeline (Supabase)

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: "Postgres URL (Vercel trigger passes DATABASE_URL; or leave empty if repo secret is set)"
        required: false
        type: string
  workflow_call:
    inputs:
      database_url:
        required: false
        type: string

concurrency:
  group: fivb-dbt-elo-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${{ inputs.database_url || github.event.inputs.database_url || secrets.DATABASE_URL }}
    defaults:
      run:
        working-directory: fivb-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask DATABASE_URL in logs
        run: echo "::add-mask::${DATABASE_URL}"

      - name: Require DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::No DATABASE_URL. Use the Vercel trigger (passes workflow input), or set repository secret DATABASE_URL and run workflow_dispatch with an empty input."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fivb-pipeline/requirements-cron.txt

      - name: Install dependencies
        run: pip install -r requirements-cron.txt

      - name: Run dbt and Elo pipeline
        run: python run_fivb_dbt_elo_pipeline.py
