# Staging layer: one-to-one from raw with explicit column list and tests.
# Column stats (null %, distinct) can be appended via: python scripts/raw_column_stats.py --update-staging-schema
version: 2
models:
  - name: stg_fivb_events
    description: "FIVB events (e.g. World Tour, World Champs) – staging from raw.raw_fivb_events"
    columns:
      - name: event_id
        description: "Unique event number (VIS No)"
        test: unique
      - name: code
      - name: name
      - name: start_date
      - name: end_date
      - name: type
      - name: no_parent_event
      - name: country_code
      - name: has_beach_tournament
      - name: has_men_tournament
      - name: has_women_tournament
      - name: is_vis_managed
      - name: payload
      - name: ingested_at

  - name: stg_fivb_tournaments
    description: "Beach tournaments – staging from raw.raw_fivb_tournaments"
    columns:
      - name: tournament_id
        description: "Unique tournament number (VIS No)"
        test: unique
      - name: name
      - name: season
      - name: tier
      - name: start_date
      - name: end_date
        description: "Tournament end. API returns EndDateMainDraw not EndDate; ETL uses EndDateMainDraw (or EndDateQualification) when EndDate is null."
      - name: city
        description: "Tournament city/venue. GetBeachTournamentList does not return City; ETL infers from Name when it is a single place-like word (e.g. Acapulco, Berlin)."
      - name: country_code
      - name: country_name
      - name: gender
      - name: status
      - name: timezone
        description: "VIS DefaultLocalTimeOffset is 'not used'; not returned by GetBeachTournamentList. Do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_teams
    description: "Beach teams (partnerships) – staging from raw.raw_fivb_teams"
    columns:
      - name: team_id
        description: "Unique team number (VIS No)"
        test: unique
      - name: tournament_id
      - name: player_a_id
      - name: player_b_id
      - name: country_code
      - name: status
      - name: valid_from
        description: "VIS ValidFrom (team validity period). Always null in API response; do not rely on."
      - name: valid_to
        description: "VIS ValidTo (team validity period). Always null in API response; do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_players
    description: "Players – staging from raw.raw_fivb_players"
    columns:
      - name: player_id
        description: "Unique player number (VIS No)"
        test: unique
      - name: first_name
      - name: last_name
      - name: full_name
      - name: gender
      - name: birth_date
      - name: height_inches
        description: "Player height in inches, converted from raw height_cm (cm / 2.54). Null when not provided."
      - name: country_code
        description: "Player federation/country from VIS FederationCode (e.g. USA, BRA). GetPlayerList does not return CountryCode; we use FederationCode."
      - name: profile_url
        description: "Not returned by GetPlayerList; always null. Do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_matches
    description: "Beach matches – staging from raw.raw_fivb_matches"
    columns:
      - name: match_id
        description: "Unique match number (VIS No)"
        test: unique
      - name: tournament_id
      - name: phase
        description: "Match phase from API. Nearly always null; do not rely on. Use round_code or stg_fivb_rounds.phase instead."
      - name: round_code
        description: "Round code or id (e.g. PA, QF) from raw round field"
      - name: team1_id
      - name: team2_id
      - name: winner_team_id
      - name: score_sets
      - name: duration_minutes
      - name: played_at
        description: "Match start time from API. Nearly always null; do not rely on."
      - name: result_type
      - name: status
      - name: payload
      - name: ingested_at

  - name: stg_fivb_results
    description: "Tournament finishing positions (GetBeachTournamentRanking) – staging from raw.raw_fivb_results"
    columns:
      - name: tournament_id
      - name: team_id
      - name: finishing_pos
      - name: points
        description: "From API EarnedPointsTeam (points earned at this tournament). Request this field; null when API does not populate."
      - name: prize_money
        description: "From API EarningsTotalTeam (prize/earnings). Request this field; null when API does not populate."
      - name: payload
      - name: ingested_at
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tournament_id
              - team_id

  - name: stg_fivb_rounds
    description: "Tournament round structure (pools, elimination) – staging from raw.raw_fivb_rounds"
    columns:
      - name: round_id
        description: "Unique round number (VIS No)"
        test: unique
      - name: tournament_id
      - name: code
        description: "Round code (e.g. PA, PB, QF, SF, F1)"
      - name: name
        description: "Human-readable round name (e.g. Pool A, Quarterfinals)"
      - name: bracket
      - name: phase
      - name: start_date
      - name: end_date
      - name: rank_method
      - name: payload
      - name: ingested_at

  - name: stg_fivb_tournament_first_place_points
    description: "Per tournament: points awarded to 1st place (champion) from GetBeachTournamentRanking EarnedPointsTeam. One row per tournament that has a finishing_pos = 1 row in stg_fivb_results."
    columns:
      - name: tournament_id
        description: "VIS tournament number."
        tests:
          - unique
          - not_null
      - name: first_place_points
        description: "Points on the rank-1 row (same as champion EarnedPointsTeam). Null when VIS does not populate points."
      - name: ingested_at
        description: "Latest ingested_at among champion rows for this tournament."

  - name: stg_vw_player_tournament_stats
    description: >
      Volleyball World BPT player statistics (raw_vw_player_tournament_stats) with heuristic links to
      stg_fivb_tournaments and stg_fivb_events. VIS does not expose VW URLs; matching uses BPT season
      from event_key, bucket→tier (challenge/elite16/future), place token vs last word of tournament
      name, and men/women from stat_url. vis_tournament_id is null when there are zero or multiple
      candidate tournaments (see vw_vis_candidate_count).
    columns:
      - name: event_key
        description: "Path prefix on en.volleyballworld.com up to /statistics (tournament hub)."
      - name: stat_url
        description: "Canonical statistics subpage URL (men or women best-* category)."
      - name: vw_player_id
        description: "Volleyball World player id from HTML data-player-no."
      - name: display_rank
      - name: player_name
      - name: federation
      - name: metrics
      - name: ingested_at
      - name: vw_bpt_season
        description: "BPT season year parsed from event_key (beach-pro-tour/YYYY/ or beach-pro-tour-YYYY/)."
      - name: vw_bpt_bucket
        description: "challenge | elite16 | future from URL path."
      - name: vw_place_slug
        description: "Lowercased slug segment after the bucket (e.g. baden-aut, gstaad-sui)."
      - name: vw_place_token
        description: "First hyphen-separated segment of vw_place_slug; matched to last word of VIS tournament name."
      - name: vw_expected_tier
        description: "VIS tier inferred from bucket (52/51/53 for challenge/elite16/future)."
      - name: vw_stat_gender_code
        description: "0 = men page, 1 = women page (VIS Gender field on tournaments)."
      - name: vis_tournament_id
        description: "Matched stg_fivb_tournaments.tournament_id when vw_vis_candidate_count = 1; else null."
      - name: vw_vis_candidate_count
        description: "Number of VIS tournament rows matching season/tier/gender/name heuristic for this stat_url."
      - name: vis_tournament_name
      - name: vis_no_event
        description: "VIS NoEvent from tournament payload (parent event id), when present."
      - name: vis_event_id
        description: "stg_fivb_events.event_id via NoEvent join."
      - name: vis_event_code
      - name: vis_event_name

  - name: stg_fivb_team_rankings
    description: "World Tour and Olympic selection rankings (M/W) – staging from raw.raw_fivb_team_rankings"
    columns:
      - name: ranking_type
      - name: snapshot_date
      - name: gender
      - name: position
      - name: no_player1
      - name: no_player2
      - name: team_name
      - name: earned_points
        description: "Cumulative points (EarnedPointsTeam for World Tour, Points for Olympic)."
      - name: payload
      - name: ingested_at
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ranking_type
              - snapshot_date
              - gender
              - position

  - name: stg_fivb_player_entry_points
    description: >
      Current athlete entry/seeding points as of current_date using FIVB-style best-3-of-last-4
      in a trailing 365-day window. Base score uses Beach Pro Tour (Elite/Challenge/Future) plus
      Senior World Championships; other sanctioned tournaments are included only when they improve
      the athlete's score. Technical points are the 365-day sum used as first tie-break support.
    columns:
      - name: as_of_date
        description: "Calculation date (current_date)."
      - name: player_id
        description: "VIS player number."
        tests:
          - unique
          - not_null
      - name: player_name
      - name: country_code
      - name: gender
      - name: technical_points_365d
        description: "Sum of tournament ranking points earned in the trailing 365 days (tie-break helper)."
      - name: base_best_three_points
        description: "Best 3 points out of the most recent 4 base events (Elite/Challenge/Future + Senior Worlds)."
      - name: all_events_best_three_points
        description: "Best 3 points out of the most recent 4 events across all sanctioned events in scope."
      - name: entry_seeding_points
        description: "Final athlete entry/seeding points: greatest(base_best_three_points, all_events_best_three_points)."
      - name: includes_other_events_for_improvement
        description: "True when non-base events increase the final entry/seeding points."
      - name: base_events_in_365d
        description: "Count of base events in the trailing 365-day window."
      - name: all_events_in_365d
        description: "Count of all scored events in the trailing 365-day window."

  - name: stg_fivb_team_entry_points
    description: >
      Current team entry/seeding points as of current_date, computed as the sum of the two athletes'
      entry_seeding_points from stg_fivb_player_entry_points. Includes summed technical points for
      tie-break support at team level.
    columns:
      - name: as_of_date
        description: "Calculation date inherited from stg_fivb_player_entry_points (current_date)."
      - name: team_id
        description: "VIS team number."
        tests:
          - unique
          - not_null
      - name: tournament_id
      - name: player_a_id
      - name: player_b_id
      - name: country_code
      - name: player_a_entry_seeding_points
      - name: player_b_entry_seeding_points
      - name: team_entry_seeding_points
        description: "Final team entry/seeding points = player_a_entry_seeding_points + player_b_entry_seeding_points."
      - name: player_a_technical_points_365d
      - name: player_b_technical_points_365d
      - name: team_technical_points_365d
        description: "Team tie-break helper = sum of athlete technical_points_365d."
