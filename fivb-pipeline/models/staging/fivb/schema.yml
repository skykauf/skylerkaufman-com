# Staging layer: one-to-one from raw with explicit column list and tests.
# Column stats (null %, distinct) can be appended via: python scripts/raw_column_stats.py --update-staging-schema
version: 2
models:
  - name: stg_fivb_events
    description: "FIVB events (e.g. World Tour, World Champs) – staging from raw.raw_fivb_events"
    columns:
      - name: event_id
        description: "Unique event number (VIS No)"
        test: unique
      - name: code
      - name: name
      - name: start_date
      - name: end_date
      - name: type
      - name: no_parent_event
      - name: country_code
      - name: has_beach_tournament
      - name: has_men_tournament
      - name: has_women_tournament
      - name: is_vis_managed
      - name: payload
      - name: ingested_at

  - name: stg_fivb_tournaments
    description: "Beach tournaments – staging from raw.raw_fivb_tournaments"
    columns:
      - name: tournament_id
        description: "Unique tournament number (VIS No)"
        test: unique
      - name: name
      - name: season
      - name: tier
      - name: start_date
      - name: end_date
        description: "Tournament end. API returns EndDateMainDraw not EndDate; ETL uses EndDateMainDraw (or EndDateQualification) when EndDate is null."
      - name: city
        description: "Tournament city/venue. GetBeachTournamentList does not return City; ETL infers from Name when it is a single place-like word (e.g. Acapulco, Berlin)."
      - name: country_code
      - name: country_name
      - name: gender
      - name: status
      - name: timezone
        description: "VIS DefaultLocalTimeOffset is 'not used'; not returned by GetBeachTournamentList. Do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_teams
    description: "Beach teams (partnerships) – staging from raw.raw_fivb_teams"
    columns:
      - name: team_id
        description: "Unique team number (VIS No)"
        test: unique
      - name: tournament_id
      - name: player_a_id
      - name: player_b_id
      - name: country_code
      - name: status
      - name: valid_from
        description: "VIS ValidFrom (team validity period). Always null in API response; do not rely on."
      - name: valid_to
        description: "VIS ValidTo (team validity period). Always null in API response; do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_players
    description: "Players – staging from raw.raw_fivb_players"
    columns:
      - name: player_id
        description: "Unique player number (VIS No)"
        test: unique
      - name: first_name
      - name: last_name
      - name: full_name
      - name: gender
      - name: birth_date
      - name: height_inches
        description: "Player height in inches, converted from raw height_cm (cm / 2.54). Null when not provided."
      - name: country_code
        description: "Player federation/country from VIS FederationCode (e.g. USA, BRA). GetPlayerList does not return CountryCode; we use FederationCode."
      - name: profile_url
        description: "Not returned by GetPlayerList; always null. Do not rely on."
      - name: payload
      - name: ingested_at

  - name: stg_fivb_matches
    description: "Beach matches – staging from raw.raw_fivb_matches"
    columns:
      - name: match_id
        description: "Unique match number (VIS No)"
        test: unique
      - name: tournament_id
      - name: phase
        description: "Match phase from API. Nearly always null; do not rely on. Use round_code or stg_fivb_rounds.phase instead."
      - name: round_code
        description: "Round code or id (e.g. PA, QF) from raw round field"
      - name: team1_id
      - name: team2_id
      - name: winner_team_id
      - name: score_sets
      - name: duration_minutes
      - name: played_at
        description: "Match start time from API. Nearly always null; do not rely on."
      - name: result_type
      - name: status
      - name: payload
      - name: ingested_at

  - name: stg_fivb_results
    description: "Tournament finishing positions (GetBeachTournamentRanking) – staging from raw.raw_fivb_results"
    columns:
      - name: tournament_id
      - name: team_id
      - name: finishing_pos
      - name: points
        description: "From API EarnedPointsTeam (points earned at this tournament). Request this field; null when API does not populate."
      - name: prize_money
        description: "From API EarningsTotalTeam (prize/earnings). Request this field; null when API does not populate."
      - name: payload
      - name: ingested_at
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tournament_id
              - team_id

  - name: stg_fivb_rounds
    description: "Tournament round structure (pools, elimination) – staging from raw.raw_fivb_rounds"
    columns:
      - name: round_id
        description: "Unique round number (VIS No)"
        test: unique
      - name: tournament_id
      - name: code
        description: "Round code (e.g. PA, PB, QF, SF, F1)"
      - name: name
        description: "Human-readable round name (e.g. Pool A, Quarterfinals)"
      - name: bracket
      - name: phase
      - name: start_date
      - name: end_date
      - name: rank_method
      - name: payload
      - name: ingested_at

  - name: stg_fivb_team_rankings
    description: "World Tour and Olympic selection rankings (M/W) – staging from raw.raw_fivb_team_rankings"
    columns:
      - name: ranking_type
      - name: snapshot_date
      - name: gender
      - name: position
      - name: no_player1
      - name: no_player2
      - name: team_name
      - name: earned_points
        description: "Cumulative points (EarnedPointsTeam for World Tour, Points for Olympic)."
      - name: payload
      - name: ingested_at
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ranking_type
              - snapshot_date
              - gender
              - position
