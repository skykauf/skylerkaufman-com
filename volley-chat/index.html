<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volley Chat — Skyler Kaufman</title>
    <meta name="description" content="Hosted open-source LLM chat with optional Postgres tool access" />
    <link rel="stylesheet" href="/volley-chat/volley.css" />
  </head>
  <body class="volley-page">
    <header class="volley-header">
      <a class="volley-back" href="/">← Home</a>
      <h1 class="volley-title">Volley Chat</h1>
      <p class="volley-sub">Uses a hosted open-source LLM with optional Postgres tool access.</p>
      <p class="volley-model-meta">Model: <span id="modelMeta" class="volley-model-pill">Detecting…</span></p>
      <div class="volley-controls-row">
        <label class="volley-style-label" for="responseStyle">Style</label>
        <select id="responseStyle" class="volley-style-select">
          <option value="balanced">Balanced</option>
          <option value="brief">Brief</option>
          <option value="table">Table</option>
          <option value="scout">Scout report</option>
        </select>
      </div>
      <div class="volley-auth-row">
        <button id="googleSignIn" class="volley-auth-btn google" type="button">
          <span class="volley-google-icon" aria-hidden="true">
            <svg viewBox="0 0 18 18" width="14" height="14">
              <path fill="#EA4335" d="M9 7.2v3.6h5c-.2 1.2-1.4 3.6-5 3.6A5.4 5.4 0 1 1 9 3.6c2 0 3.3.9 4 1.6l2.7-2.6A9 9 0 1 0 9 18c5.2 0 8.6-3.6 8.6-8.7 0-.6-.1-1.1-.2-1.6H9z" />
              <path fill="#34A853" d="M1.7 5.9l3 2.2A5.4 5.4 0 0 1 9 3.6c2 0 3.3.9 4 1.6l2.7-2.6A9 9 0 0 0 1.7 5.9z" />
              <path fill="#4A90E2" d="M9 18c2.4 0 4.5-.8 6-2.2l-2.8-2.3c-.8.5-1.8.9-3.2.9-2.9 0-5.3-2-6.1-4.7l-3 2.3A9 9 0 0 0 9 18z" />
              <path fill="#FBBC05" d="M2.9 9.7c-.2-.5-.3-1-.3-1.7s.1-1.1.3-1.7L0 4c-.6 1.2-1 2.6-1 4s.4 2.8 1 4l2.9-2.3z" />
            </svg>
          </span>
          <span>Sign in with Google</span>
        </button>
        <button id="signOut" class="volley-auth-btn secondary" type="button" hidden>Sign out</button>
        <span id="authStatus" class="volley-auth-status">Guest mode (ephemeral chat)</span>
      </div>
      <div id="contextBar" class="volley-context-bar"></div>
    </header>

    <main class="volley-main">
      <section class="volley-history">
        <div class="volley-tools-head">Saved Chats</div>
        <div class="volley-history-actions">
          <button id="newChat" class="volley-auth-btn secondary" type="button">New chat</button>
        </div>
        <div id="historyList" class="volley-history-list"></div>
      </section>
      <section class="volley-tools">
        <div class="volley-tools-head">Tool Activity</div>
        <div id="toolActivity" class="volley-tools-body" aria-live="polite"></div>
      </section>
      <div id="thread" class="volley-thread" aria-live="polite"></div>
      <form id="composer" class="volley-composer">
        <label class="volley-sr" for="input">Message</label>
        <textarea
          id="input"
          class="volley-input"
          rows="2"
          placeholder="Ask anything…"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="volley-send" id="send">Send</button>
      </form>
      <p id="status" class="volley-status" role="status"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/volley-chat/volley.js" defer></script>
  </body>
</html>
