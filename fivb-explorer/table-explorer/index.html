<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FIVB Table Explorer</title>
    <meta
      name="description"
      content="Explore FIVB player attributes and full match history with interactive filters."
    />
    <link rel="stylesheet" href="/site-cosmic.css" />
    <link rel="stylesheet" href="/fivb-explorer/table-explorer/styles.css" />
  </head>
  <body class="cosmic-site">
    <canvas id="bg" aria-hidden="true"></canvas>
    <nav class="cosmic-toolbar" aria-label="SkylerKaufman.com areas">
      <a href="/" class="cosmic-toolbar__link cosmic-toolbar__link--home">
        <span class="cosmic-toolbar__orb" aria-hidden="true"></span>
        <span class="cosmic-toolbar__label">Home</span>
      </a>
      <div class="cosmic-toolbar__sites">
        <a href="/volley-chat/" class="cosmic-toolbar__link cosmic-toolbar__link--volley">
          <span class="cosmic-toolbar__orb" aria-hidden="true"></span>
          <span class="cosmic-toolbar__label">Volley Chat</span>
        </a>
        <a
          href="/fivb-explorer/"
          class="cosmic-toolbar__link cosmic-toolbar__link--fivb cosmic-toolbar__link--current"
          aria-current="page"
        >
          <span class="cosmic-toolbar__orb" aria-hidden="true"></span>
          <span class="cosmic-toolbar__label">Explorer</span>
        </a>
        <a
          href="/fivb-explorer/matchup-predictor/"
          class="cosmic-toolbar__link cosmic-toolbar__link--matchup"
        >
          <span class="cosmic-toolbar__orb" aria-hidden="true"></span>
          <span class="cosmic-toolbar__label">Matchup</span>
        </a>
        <a href="/math-meteor/" class="cosmic-toolbar__link cosmic-toolbar__link--math">
          <span class="cosmic-toolbar__orb" aria-hidden="true"></span>
          <span class="cosmic-toolbar__label">Math Meteor</span>
        </a>
      </div>
    </nav>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Explorer</p>
        <h1>FIVB Table Explorer</h1>
        <p class="lede">
          Load a player by ID or name, then explore full match and ELO history.
        </p>
        <p id="status" class="status">Ready.</p>
      </header>

      <section class="card">
        <h2>Player History</h2>
        <form id="historyForm" class="history-row">
          <label>Player ID <input id="historyPlayerId" type="text" placeholder="100273" /></label>
          <label>or Name <input id="historyPlayerName" type="text" placeholder="Barbra Fontana" /></label>
          <label>Matches Limit <input id="historyLimit" type="number" min="1" max="1000" value="250" /></label>
          <div class="button-row"><button type="submit">Load History</button></div>
        </form>
        <div id="playerProfile"></div>
        <h3>Match + ELO Timeline</h3>
        <div id="timeline"></div>
      </section>
    </main>

    <script src="/visuals.js" defer></script>
    <script src="/fivb-explorer/table-explorer/page.js" defer></script>
  </body>
</html>
